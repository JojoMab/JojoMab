name: Thermal Process Monitor CI

on:
  push:
    paths:
      - 'thermal-process-monitor/**'
      - '.github/workflows/thermal-process-monitor-ci.yml'
  pull_request:
    paths:
      - 'thermal-process-monitor/**'
      - '.github/workflows/thermal-process-monitor-ci.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: thermal-process-monitor

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
